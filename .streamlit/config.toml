# Pin light theme so system dark-mode doesn't flip widget colors.
[theme]
base = "light"
primaryColor = "#1F3A5F"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
textColor = "#1C2B3A"
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[server]
headless = true
